[temm1e]
mode = "local"

[gateway]
host = "127.0.0.1"
port = 8080
tls = false

[provider]
# Sử dụng openai-compatible cho Gemma để tránh lỗi Unknown Model của Gemini Native
name = "openai-compatible"
api_key = "${GEMINI_API_KEY}"
keys = ["${GEMINI_KEY_2}", "${GEMINI_KEY_3}"] # Thêm các key dự phòng ở đây
model = "gemma-4-31b-it"
base_url = "https://generativelanguage.googleapis.com/v1beta"

# Nếu bạn muốn dùng NVIDIA, hãy comment phần trên và uncomment phần dưới
# [provider.nvidia]
# name = "nvidia"
# api_key = "${NVIDIA_API_KEY}"
# keys = ["${NVIDIA_KEY_2}", "${NVIDIA_KEY_3}"]
# model = "meta/llama-3.1-405b-instruct"
# base_url = "https://integrate.api.nvidia.com/v1"

[agent]
# max_spend_usd = 0.0  # 0.0 = unlimited (default). Set a value to cap per-process spend.

[memory]
backend = "sqlite"

[memory.search]
vector_weight = 0.7
keyword_weight = 0.3

[vault]
backend = "local-chacha20"

[filestore]
backend = "local"

[security]
sandbox = "mandatory"
file_scanning = true
skill_signing = "required"
audit_log = true

[heartbeat]
enabled = false
interval = "30m"
checklist = "HEARTBEAT.md"
# report_to = ""  # Set to your Telegram chat ID for heartbeat reports

[cron]
storage = "sqlite"

[tools]
shell = true
browser = true
file = true
git = true
cron = true
http = true

[observability]
log_level = "info"
otel_enabled = false

[channel.telegram]
enabled = true
token = "${TELEGRAM_BOT_TOKEN}"
allowlist = []
file_transfer = true

[channel.whatsapp_web]
enabled = true
token = "allowlist:ignore"
allowlist = []
file_transfer = true

[awareness]
enabled = true
confidence_threshold = 0.7
max_interventions_per_session = 10
observation_mode = "rules_first"
